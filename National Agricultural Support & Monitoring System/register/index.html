<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NASMS – Farmer Registration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../shared/shared.css">
  <link rel="stylesheet" href="../shared/nav.css">
  <link rel="stylesheet" href="../shared/footer.css">
  <link rel="stylesheet" href="register.css">
</head>
<body>

  <div id="nav-container"></div>

  <main class="register-page">
    <div class="register-card animate">
      <div class="form-brand">
        <div class="brand-icon">🌾</div>
        <div>
          <h2>Farmer Registration</h2>
          <p>National Agricultural Support &amp; Monitoring System</p>
        </div>
      </div>

      <!-- Step Indicator -->
      <div class="steps">
        <div class="step active" data-step="1"><span>1</span> Personal</div>
        <div class="step-line"></div>
        <div class="step" data-step="2"><span>2</span> Farm</div>
        <div class="step-line"></div>
        <div class="step" data-step="3"><span>3</span> Security</div>
      </div>

      <form id="regForm" no validate>

        <!-- Step 1: Personal Info -->
        <div class="step-panel active" id="step-1">
          <h3 class="step-title">Personal Information</h3>
          <div class="form-grid">
            <div class="form-group">
              <label>Full Name *</label>
              <input type="text" id="fullName" placeholder="e.g. John Kamau Mwangi" required>
              <span class="field-error" id="err-fullName"></span>
            </div>
            <div class="form-group">
              <label>National ID *</label>
              <input type="text" id="nationalId" placeholder="Enter your National ID" required>
              <span class="field-error" id="err-nationalId"></span>
            </div>
            <div class="form-group">
              <label>Phone Number *</label>
              <input type="tel" id="phone" placeholder="+254 7XX XXX XXX" required>
              <span class="field-error" id="err-phone"></span>
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" id="email" placeholder="john@example.com">
              <span class="field-error" id="err-email"></span>
            </div>
          </div>
          <div class="step-actions">
            <button type="button" class="btn-full" onclick="nextStep(1)">
              Next: Farm Details <i class="fa fa-arrow-right"></i>
            </button>
          </div>
        </div>

        <!-- Step 2: Farm Info -->
        <div class="step-panel" id="step-2">
          <h3 class="step-title">Farm Information</h3>
          <div class="form-grid">
            <div class="form-group">
              <label>Land / Farm Size (Acres) *</label>
              <input type="number" id="farmSize"name="farmSize" placeholder="e.g. 5.5" min="0.1" required>
              <span class="field-error" id="err-farmSize"></span>
            </div>
            <div class="form-group">
              <label>Title Deed Number *</label>
              <input type="text" id="titleDeed" placeholder="e.g. MSA/1234/56" required>
              <span class="field-error" id="err-titleDeed"></span>
            </div>
            <div class="form-group">
              <label>County / Farm Location *</label>
              <select id="county" required>
                <option value="">Select County</option>
                <option>Nairobi</option>
                <option>Kiambu</option>
                <option>Murang'a</option>
                <option>Nakuru</option>
                <option>Meru</option>
                <option>Kisumu</option>
                <option>Uasin Gishu</option>
                <option>Mombasa</option>
                <option>Machakos</option>
                <option>Nyeri</option>
                <option>Laikipia</option>
                <option>Nyandarua</option>
                <option>Embu</option>
                <option>Kitui</option>
                <option>Machakos</option>
                <option>Tharaka  Nithi</option>
                <option>Other</option>
              </select>
              <span class="field-error" id="err-county"></span>
            </div>
            <div class="form-group">
              <label>Type of Farming *</label>
              <select id="farmType" required>
                <option value="">Select Type</option>
                <option>Crop Farming</option>
                <option>Livestock Farming</option>
                <option>Mixed Farming</option>
                <option>Poultry</option>
                <option>Horticulture</option>
                <option>Aquaculture</option>
                <option>Agroforestry</option>
              </select>
              <span class="field-error" id="err-farmType"></span>
            </div>
          </div>
          <div class="step-actions two">
            <button type="button" class="btn-back" onclick="prevStep(2)">
              <i class="fa fa-arrow-left"></i> Back
            </button>
            <button type="button" class="btn-full" onclick="nextStep(2)">
              Next: Security <i class="fa fa-arrow-right"></i>
            </button>
          </div>
        </div>

        <!-- Step 3: Security -->
        <div class="step-panel" id="step-3">
          <h3 class="step-title">Account Security</h3>
          <div class="form-grid single">
            <div class="form-group">
              <label>Password *</label>
              <div class="input-wrap">
                <input type="password" id="regPassword" placeholder="Create a strong password" required>
                <button type="button" class="toggle-pwd" onclick="toggleRegPwd('regPassword','regEye')" aria-label="Toggle">
                  <i class="fa fa-eye" id="regEye"></i>
                </button>
              </div>
              <div class="pwd-strength" id="pwdStrength"></div>
              <span class="field-error" id="err-regPassword"></span>
            </div>
            <div class="form-group">
              <label>Confirm Password *</label>
              <div class="input-wrap">
                <input type="password" id="confirmPassword" placeholder="Repeat password" required>
                <button type="button" class="toggle-pwd" onclick="toggleRegPwd('confirmPassword','cfmEye')" aria-label="Toggle">
                  <i class="fa fa-eye" id="cfmEye"></i>
                </button>
              </div>
              <span class="field-error" id="err-confirmPassword"></span>
            </div>
            <div class="form-group full">
              <label class="checkbox-label">
                <input type="checkbox" id="terms" required>
                I agree to the <a href="#">Terms of Use</a> and <a href="#">Privacy Policy</a>
              </label>
              <span class="field-error" id="err-terms"></span>
            </div>
          </div>
          <div class="step-actions two">
            <button type="button" class="btn-back" onclick="prevStep(3)">
              <i class="fa fa-arrow-left"></i> Back
            </button>
            <button type="submit" class="btn-full" id="submitBtn">
              <i class="fa fa-check-circle"></i> Complete Registration
            </button>
          </div>
        </div>
      </form>
      <p class="form-footer">
        Already registered? <a href="../login/index.html">Sign in here</a>
      </p>
    </div>
  </main>
  <div id="footer-container"></div>
  <script src="../shared/nav.js"></script>
  <script src="../shared/footer.js"></script>
  <script src="register.js"></script>
</body>
</html>
