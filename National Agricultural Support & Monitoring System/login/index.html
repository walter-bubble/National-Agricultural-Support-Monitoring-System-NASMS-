<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NASMS – Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../shared/shared.css">
  <link rel="stylesheet" href="../shared/nav.css">
  <link rel="stylesheet" href="../shared/footer.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <div id="nav-container"></div>

  <main class="login-page">
    <div class="login-card animate">
      <div class="form-brand">
        <div class="brand-icon">🌾</div>
        <div>
          <h2>Welcome Back</h2>
          <p>Sign in to your NASMS account</p>
        </div>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="identifier">Email / Phone Number</label>
          <div class="input-wrap">
            <i class="fa fa-user"></i>
            <input type="text" id="identifier" placeholder="Email or +254 7XX XXX XXX" required>
          </div>
          <span class="field-error" id="err-identifier"></span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <i class="fa fa-lock"></i>
            <input type="password" id="password" placeholder="Enter your password" required>
            <button type="button" class="toggle-pwd" onclick="togglePassword()" aria-label="Toggle password">
              <i class="fa fa-eye" id="eyeIcon"></i>
            </button>
          </div>
          <span class="field-error" id="err-password"></span>
        </div>

        <div class="form-row">
          <label class="checkbox-label">
            <input type="checkbox" id="rememberMe"> Remember me
          </label>
          <a href="#" class="forgot-link">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-full" id="loginBtn">
          <i class="fa fa-sign-in-alt"></i> Sign In
        </button>

        <div class="login-divider"><span>or continue with</span></div>

        <div class="social-login">
          <button type="button" class="social-btn"><i class="fab fa-google"></i> Google</button>
          <button type="button" class="social-btn"><i class="fab fa-facebook-f"></i> Facebook</button>
        </div>
      </form>

      <p class="form-footer">
        New farmer? <a href="../register/index.html">Register here</a>
      </p>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="../shared/nav.js"></script>
  <script src="../shared/footer.js"></script>
  <script src="login.js"></script>
</body>
</html>
